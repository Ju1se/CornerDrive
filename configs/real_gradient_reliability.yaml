experiment: real_gradient_reliability
description: "Three-source real-data client-gradient benchmark used for thesis Table 5.1 and Table 5.2."

sources:
  - mnist
  - fashionmnist
  - femnist

seeds:
  - 20260527
  - 20260528
  - 20260529
  - 20260530
  - 20260531
  - 20260532
  - 20260533
  - 20260534
  - 20260535
  - 20260536
  - 20260537
  - 20260538
  - 20260539
  - 20260540
  - 20260541
  - 20260542
  - 20260543
  - 20260544
  - 20260545
  - 20260546

data:
  data_dir: data/real
  leaf_data_dir: data/real/femnist
  download: true
  max_clients: 120
  min_samples_per_client: 8
  max_samples_per_client: 48
  clients_per_round: 20
  rounds: 10
  pretrain_steps: 50
  local_batch_size: 16
  reference_split_fraction: 0.50
  max_reference_samples: 4096
  max_evaluation_samples: 4096

split_protocol:
  mnist_fashionmnist: "train split builds client gradients; official test split is deterministically divided into audit/reference and final evaluation subsets."
  femnist: "LEAF train shards build client gradients; LEAF test shards are deterministically divided into audit/reference and final evaluation client subsets."
  leakage_guard: "Final reported accuracy is computed on held-out evaluation data, not on the audit/reference surface used by FLTrust, Zeno, or CornerDrive L2."

policy_profile: real_data_adaptive_v41
l1_router:
  mode: v4_m4_dual_proxy_budgeted
  cosine_filter_threshold: 0.50
  cos_weight: 0.35
  norm_weight: 0.20
  sign_weight: 0.15
  norm_mad_threshold: 1.5
  sign_threshold: 0.40
  sign_topk_ratio: 0.10
  queue_budget_ratio: 0.80
  random_recheck_ratio: 0.05
  theta_corner_harm_proxy: 0.005
  quarantine_risk_threshold: 0.75
  low_weight_risk_threshold: 0.45
  safe_weight: 0.80
  low_weight: 0.20

l2_audit:
  theta_tol: 0.02
  theta_rare: -0.005
  theta_rarity_main_tol: 0.00925
  recheck_probability: 0.25

attacks:
  sign_flip_fraction: 0.20
  corner_harm_fraction: 0.05
  benign_noise_fraction: 0.05
  sign_flip_scale: 3.0
  corner_harm_scale: 2.0

outputs:
  summary: results/real_gradient_reliability_v41_best_holdout_20260527_20260546/real_gradient_reliability_summary.csv
  runs: results/real_gradient_reliability_v41_best_holdout_20260527_20260546/real_gradient_reliability_runs.csv
